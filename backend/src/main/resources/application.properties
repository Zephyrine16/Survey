spring.application.name=Survey

#Database Connection
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:disable}

#JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.open-in-view=false

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration

admin.username=${ADMIN_USER}
admin.password-hash=${ADMIN_PASSWORD_HASH}
admin.login.max-failed-attempts=${ADMIN_LOGIN_MAX_FAILED_ATTEMPTS:5}
admin.login.lockout-minutes=${ADMIN_LOGIN_LOCKOUT_MINUTES:15}
admin.login.cache-max-size=${ADMIN_LOGIN_CACHE_MAX_SIZE:1000}
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

survey.participant-limit=${SURVEY_PARTICIPANT_LIMIT:30}
survey.text-response-max-length=${SURVEY_TEXT_RESPONSE_MAX_LENGTH:250}
survey.participant-cookie-name=${SURVEY_PARTICIPANT_COOKIE_NAME:participant_id}
survey.participant-cookie-max-age-days=${SURVEY_PARTICIPANT_COOKIE_MAX_AGE_DAYS:30}
survey.export-filename=${SURVEY_EXPORT_FILENAME:CafeRater_Analytics.csv}

rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.path=${RATE_LIMIT_PATH:/submit-category}
rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:15}
rate-limit.max-size=${RATE_LIMIT_MAX_SIZE:10000}
rate-limit.message=${RATE_LIMIT_MESSAGE:Please wait a few seconds before submitting again.}

seeders.enabled=${SEEDERS_ENABLED:true}
seeders.questions-path=${SEEDERS_QUESTIONS_PATH:seed/questions.json}
seeders.menu-items-path=${SEEDERS_MENU_ITEMS_PATH:classpath:seed/menu-items.json}

# Disable Spring Security's default auto-generated password warning
spring.security.user.name=dummy
spring.security.user.password=dummy

server.port=${PORT:8080}