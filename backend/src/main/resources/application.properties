spring.application.name=Survey

#Database Connection
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE}

#JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.open-in-view=false

spring.sql.init.mode=${SPRING_SQL_INIT_MODE}
spring.jpa.defer-datasource-initialization=true
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED}
spring.flyway.locations=classpath:db/migration

admin.username=${ADMIN_USER}
admin.password-hash=${ADMIN_PASSWORD_HASH}
admin.login.max-failed-attempts=${ADMIN_LOGIN_MAX_FAILED_ATTEMPTS}
admin.login.lockout-minutes=${ADMIN_LOGIN_LOCKOUT_MINUTES}
admin.login.cache-max-size=${ADMIN_LOGIN_CACHE_MAX_SIZE}
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

survey.participant-limit=${SURVEY_PARTICIPANT_LIMIT}
survey.text-response-max-length=${SURVEY_TEXT_RESPONSE_MAX_LENGTH}
survey.participant-cookie-name=${SURVEY_PARTICIPANT_COOKIE_NAME}
survey.participant-cookie-max-age-days=${SURVEY_PARTICIPANT_COOKIE_MAX_AGE_DAYS}
survey.export-filename=${SURVEY_EXPORT_FILENAME}

rate-limit.enabled=${RATE_LIMIT_ENABLED}
rate-limit.path=${RATE_LIMIT_PATH}
rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS}
rate-limit.max-size=${RATE_LIMIT_MAX_SIZE}
rate-limit.message=${RATE_LIMIT_MESSAGE}

seeders.enabled=${SEEDERS_ENABLED}
seeders.questions-path=${SEEDERS_QUESTIONS_PATH}
seeders.menu-items-path=${SEEDERS_MENU_ITEMS_PATH}

# Disable Spring Security's default auto-generated password warning
spring.security.user.name=dummy
spring.security.user.password=dummy

server.port=${PORT}