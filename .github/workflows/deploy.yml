name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # Only deploys when you push to the main

jobs:
  # --- BACKEND JOB ---
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          cd backend
          ./mvnw clean test package

      - name: Trigger Render Backend Deploy
        if: success()
        run: curl -X POST ${{ secrets.RENDER_BACKEND_HOOK }}

  # --- FRONTEND JOB ---
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vue Build Environment (Node)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Compile Vue Production Files
        run: |
          cd frontend
          npm ci
          # Fail deploy on high/critical findings; moderate/low are tracked separately.
          npm audit --audit-level=high
          npm run build

      - name: Trigger Render Frontend Deploy
        if: success()
        run: curl -X POST ${{ secrets.RENDER_FRONTEND_HOOK }}