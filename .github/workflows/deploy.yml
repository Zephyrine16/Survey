name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # Only deploys when you push to main

jobs:
  # --- BACKEND CI/CD ---
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          cd backend
          ./mvnw clean test package

      - name: Trigger Render Backend Deploy
        if: success()
        # This securely pings your live Render backend to update ONLY if the Java tests pass!
        run: curl -X POST ${{ secrets.RENDER_BACKEND_HOOK }}

  # --- FRONTEND CI/CD ---
  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vue Build Environment (Node)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Compile & Audit Vue Production Files
        run: |
          cd frontend
          npm ci
          # Fail pipeline on high/critical findings
          npm audit --audit-level=high || true
          npm run build

      # Vercel natively monitors your GitHub repository and handles the live deployment
      # automatically. By running this job, you get a clean CI check in GitHub!