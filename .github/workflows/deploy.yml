name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # Only deploys when you push to main

jobs:
  # --- BACKEND JOB ---
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          cd backend
          ./mvnw clean package -Dmaven.test.skip=true

      - name: Trigger Render Backend Deploy
        if: success()
        run: curl -X POST ${{ secrets.RENDER_BACKEND_HOOK }}

  # --- FRONTEND JOB ---
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vue Build Environment (Node)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Compile Vue Production Files
        run: |
          cd frontend
          npm install
          npm run build

      - name: Trigger Render Frontend Deploy
        if: success()
        run: curl -X POST ${{ secrets.RENDER_FRONTEND_HOOK }}